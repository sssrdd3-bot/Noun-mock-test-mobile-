<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Noun Mock Test - Polai Academy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.9);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { height: 100vh; overflow: hidden; transition: background 0.6s cubic-bezier(0.4, 0, 0.2, 1); }

        /* Welcome & Result Screen Backgrounds */
        .welcome-bg { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%); }
        
        /* Interactive UI Elements */
        .card {
            background: var(--glass); backdrop-filter: blur(4px); border-radius: 20px;
            padding: 20px; margin: 15px; box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.18);
        }

        /* Screens */
        .screen { height: 100vh; width: 100vw; display: flex; flex-direction: column; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; }
        #test-screen { display: none; padding-top: 20px; flex-direction: column; justify-content: flex-start; }

        /* Timer & Stats */
        .header-bar { width: 90%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .timer-box { background: #e74c3c; color: white; padding: 5px 15px; border-radius: 50px; font-weight: bold; font-size: 0.9rem; }

        /* Question Palette (Mobile Grid) */
        .palette-mobile {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; width: 90%; margin-bottom: 15px;
        }
        .q-dot {
            height: 30px; width: 30px; border-radius: 8px; border: 1px solid #ccc; background: white;
            display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold;
        }
        .q-dot.active { border: 2px solid #000; transform: scale(1.1); }
        .q-dot.done { background: #27ae60; color: white; border: none; }

        /* Question Box */
        .q-box { width: 90%; flex-grow: 1; display: flex; flex-direction: column; }
        .q-text { font-size: 1.1rem; font-weight: 600; color: #2c3e50; margin-bottom: 20px; }
        
        .opt-btn {
            width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px; border: 2px solid #eee;
            background: white; text-align: left; font-size: 1rem; transition: 0.3s;
        }
        .opt-btn.selected { background: #6c5ce7; color: white; border-color: #6c5ce7; }

        /* Navigation */
        .nav-footer { width: 90%; display: flex; justify-content: space-between; padding-bottom: 25px; }
        .btn-action { padding: 12px 25px; border-radius: 12px; border: none; font-weight: bold; color: white; }
        .btn-next { background: #2d3436; }
        .btn-submit { background: #27ae60; }

        /* Result Styles */
        .result-score { font-size: 4rem; color: #6c5ce7; margin: 10px 0; font-weight: 800; }
        .yt-btn {
            display: block; width: 100%; background: #ff0000; color: white; text-align: center;
            padding: 15px; border-radius: 12px; text-decoration: none; font-weight: bold; margin-top: 20px;
        }

        /* Question Background Colors */
        .q-color-0 { background-color: #A8E6CF; } .q-color-1 { background-color: #DCEDC1; }
        .q-color-2 { background-color: #FFD3B6; } .q-color-3 { background-color: #FFAAA5; }
        .q-color-4 { background-color: #FF8B94; } .q-color-5 { background-color: #D1D1FB; }
        .q-color-6 { background-color: #FDFD96; } .q-color-7 { background-color: #84B6F4; }
        .q-color-8 { background-color: #FDCAE1; } .q-color-9 { background-color: #B2E2F2; }
    </style>
</head>
<body class="welcome-bg">

<div id="welcome-screen" class="screen">
    <div class="card" style="text-align: center; width: 85%;">
        <h1 style="color: #6c5ce7; font-size: 1.8rem;">Welcome to Polai Academy</h1>
        <p style="margin: 10px 0; color: #636e72;">Noun Mock Test - I [cite: 1414-1785]</p>
        <div style="background: #f1f2f6; padding: 15px; border-radius: 10px; margin: 15px 0;">
            <p>✅ Total Questions: 13</p>
            <p>⏱️ Time: 25 Minutes</p>
            <p>⭐ Correct: +2 | Wrong: -1</p>
        </div>
        <button onclick="startTest()" class="btn-action btn-next" style="width: 100%; padding: 15px;">Start Mock Test Now</button>
    </div>
</div>

<div id="test-screen" class="screen">
    <div class="header-bar">
        <span id="q-count" style="font-weight: bold;">Q. 1/13</span>
        <div class="timer-box" id="timer">25:00</div>
    </div>

    <div class="palette-mobile" id="palette"></div>

    <div class="card q-box">
        <div class="q-text" id="q-text">Loading...</div>
        <div id="options-box"></div>
    </div>

    <div class="nav-footer">
        <button onclick="prevQ()" id="prev-btn" class="btn-action" style="background: #95a5a6;">Prev</button>
        <button onclick="nextQ()" id="next-btn" class="btn-action btn-next">Save & Next</button>
        <button onclick="finishTest()" id="submit-btn" class="btn-action btn-submit" style="display:none;">Finish</button>
    </div>
</div>

<div id="result-screen" class="screen" style="display:none;">
    <div class="card" style="text-align: center; width: 85%;">
        <h2 style="color: #2c3e50;">Test Completed!</h2>
        <div class="result-score" id="final-score">0</div>
        <p>Total Correct: <span id="res-c" style="color:#27ae60; font-weight:bold;">0</span></p>
        <p>Total Wrong: <span id="res-w" style="color:#e74c3c; font-weight:bold;">0</span></p>
        <h3 style="margin-top: 15px;">Best of Luck! 🏆</h3>
        
        <a href="https://youtube.com/@polaiacademy?si=gUwt0zAa-S8ccqhK" target="_blank" class="yt-btn">
            <i class="fab fa-youtube"></i> Subscribe Polai Academy
        </a>
        <button onclick="location.reload()" style="background:none; border:none; color:#636e72; margin-top:15px; cursor:pointer;">Restart Test</button>
    </div>
</div>

<script>
    const questions = [
        { q: "Mr. Ram Kumar, the cashier are / on temporary withdrawal / from service.", options: ["On temporary withdrawal", "Mr. Ram Kumar, the cashier are", "From service", "No error"], correct: 1 },
        { q: "Without the greenhouse effect, / Earth temperature would be below freezing.", options: ["Earths temperature would", "Be below freezing", "Without the greenhouse effect", "No error"], correct: 0 },
        { q: "Peoples might confess / just to get out of / the interrogation room.", options: ["No error", "Peoples might confess", "Just to get out of", "The interrogation room"], correct: 1 },
        { q: "Many female mammals, including rabbits and cats ovulate / only when they mate.", options: ["No error", "Many female mammals", "Only when they mate", "Including rabbits and cats, ovulate"], correct: 3 },
        { q: "The baby's faces are expressionless and their pupils aren't visible...", options: ["No error", "The appearance of lifelessness", "Their pupils aren't visible", "The baby's faces are expressionless"], correct: 3 },
        { q: "Balloons filled with helium / travel hundreds or / even thousands of mile.", options: ["Balloons filled with helium", "Travel hundreds or", "No error", "Even thousands of mile"], correct: 3 },
        { q: "And so for the sakes / of his son he remained / absolutely calm.", options: ["Absolutely calm", "No error", "Of his son he remained", "And so for the sakes"], correct: 3 },
        { q: "Workers and companies in all sectors can contribute their skills to meet society new needs.", options: ["Sectors can contribute their skills", "No error", "To meet society new needs", "Workers and companies"], correct: 2 },
        { q: "Whatever a writer puts into a story probably comes with his own life experience.", options: ["With his own life experience", "No error", "Into a story probably comes", "Whatever a writer puts"], correct: 0 },
        { q: "Hundreds of migrants work in private firms in Erode.", options: ["Firms in Erode", "No error", "Hundreds of migrants", "Work in private"], correct: 1 },
        { q: "My friend Jatin usually wears a spectacle.", options: ["My friend Jatin", "Usually wears", "A spectacle", "No error"], correct: 2 },
        { q: "Uttar Pradesh accounts for about 16 per cent / of the country population.", options: ["Of the", "Country population", "Uttar Pradesh", "Accounts for about 16 per cent"], correct: 1 },
        { q: "Telecom is one of the Indias globally recognised success stories.", options: ["Recognised success stories", "Telecom is one of", "No error", "Indias globally"], correct: 3 }
    ];

    let curr = 0;
    let answers = new Array(questions.length).fill(null);
    let timeLeft = 25 * 60;
    let timerId;

    function startTest() {
        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('test-screen').style.display = 'flex';
        renderPalette();
        updateQ();
        timerId = setInterval(updateTimer, 1000);
    }

    function updateTimer() {
        let m = Math.floor(timeLeft / 60);
        let s = timeLeft % 60;
        document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft <= 0) finishTest();
        timeLeft--;
    }

    function renderPalette() {
        const pal = document.getElementById('palette');
        pal.innerHTML = '';
        questions.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.className = `q-dot ${answers[i] !== null ? 'done' : ''} ${i === curr ? 'active' : ''}`;
            dot.innerText = i + 1;
            pal.appendChild(dot);
        });
    }

    function updateQ() {
        const q = questions[curr];
        document.body.className = `q-color-${curr % 10}`;
        document.getElementById('q-count').innerText = `Q. ${curr + 1}/${questions.length}`;
        document.getElementById('q-text').innerText = q.q;
        
        const opts = document.getElementById('options-box');
        opts.innerHTML = '';
        q.options.forEach((o, i) => {
            const btn = document.createElement('button');
            btn.className = `opt-btn ${answers[curr] === i ? 'selected' : ''}`;
            btn.innerText = `${String.fromCharCode(65 + i)}. ${o}`;
            btn.onclick = () => { answers[curr] = i; updateQ(); };
            opts.appendChild(btn);
        });

        document.getElementById('prev-btn').style.visibility = curr === 0 ? 'hidden' : 'visible';
        document.getElementById('next-btn').style.display = curr === questions.length - 1 ? 'none' : 'block';
        document.getElementById('submit-btn').style.display = curr === questions.length - 1 ? 'block' : 'none';
        renderPalette();
    }

    function nextQ() { if (curr < questions.length - 1) { curr++; updateQ(); } }
    function prevQ() { if (curr > 0) { curr--; updateQ(); } }

    function finishTest() {
        clearInterval(timerId);
        document.getElementById('test-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'flex';
        document.body.className = 'welcome-bg';

        let c = 0, w = 0;
        answers.forEach((a, i) => {
            if (a !== null) {
                if (a === questions[i].correct) c++;
                else w++;
            }
        });
        document.getElementById('final-score').innerText = (c * 2) - w;
        document.getElementById('res-c').innerText = c;
        document.getElementById('res-w').innerText = w;
    }
</script>
</body>
</html>
