<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Noun Mock Test | Polai Academy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            height: 100vh; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: background 0.5s ease;
            overflow: hidden;
        }

        /* Top Bar: Time & Real-time Score */
        .top-bar {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .score-live { font-size: 0.8rem; font-weight: bold; }
        .timer-box { 
            background: #e74c3c; 
            padding: 5px 12px; 
            border-radius: 50px; 
            font-size: 0.9rem; 
            font-weight: 800;
        }

        /* Attendance / Question Palette */
        .attendance-board {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            padding: 10px;
            background: rgba(255,255,255,0.1);
        }
        .q-dot {
            height: 25px; width: 25px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; color: white;
        }
        .q-dot.active { border: 2px solid #fff; background: rgba(255,255,255,0.5); }
        .q-dot.done { background: #27ae60; border: none; }

        /* Main Question Area */
        .container { 
            padding: 15px; 
            height: calc(100vh - 150px);
            display: flex;
            flex-direction: column;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .q-header { color: #8e44ad; font-weight: bold; margin-bottom: 10px; }
        .q-text { font-size: 1.1rem; color: #2c3e50; line-height: 1.4; margin-bottom: 20px; }

        .option-btn {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 10px;
            border: 2px solid #f1f2f6;
            border-radius: 12px;
            background: #fff;
            text-align: left;
            font-size: 1rem;
            transition: 0.3s;
        }
        .option-btn.selected { 
            background: #6c5ce7; 
            color: white; 
            border-color: #6c5ce7;
            transform: scale(1.02);
        }

        /* Navigation Buttons */
        .nav-btns {
            display: flex;
            justify-content: space-between;
            margin-top: auto;
            padding-top: 15px;
        }
        .btn {
            padding: 12px 25px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            font-size: 0.9rem;
            color: white;
        }
        .btn-prev { background: #95a5a6; }
        .btn-next { background: #2d3436; }
        .btn-submit { background: #27ae60; width: 100%; margin-top: 10px; }

        /* Result Screen */
        .result-screen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #f8f9fa; display: none; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px;
            text-align: center; z-index: 10000;
        }

        /* Dynamic Background Colors per Question */
        .bg-0 { background: #6c5ce7; }
        .bg-1 { background: #00b894; }
        .bg-2 { background: #e17055; }
        .bg-3 { background: #fdcb6e; }
        .bg-4 { background: #d63031; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="score-live">
            <span style="color: #55efc4;">Correct: <span id="live-c">0</span></span> | 
            <span style="color: #ff7675;">Wrong: <span id="live-w">0</span></span>
        </div>
        <div class="timer-box" id="timer">25:00</div>
    </div>

    <div class="attendance-board" id="palette"></div>

    <div class="container">
        <div class="card">
            <div class="q-header" id="q-num">Question 1/13</div>
            <div class="q-text" id="q-text">Loading question...</div>
            
            <div id="options-container">
                </div>

            <div class="nav-btns">
                <button class="btn btn-prev" onclick="changeQ(-1)" id="prev-btn">Previous</button>
                <button class="btn btn-next" onclick="changeQ(1)" id="next-btn">Save & Next</button>
            </div>
            <button class="btn btn-submit" id="submit-btn" style="display:none;" onclick="showResult()">Final Submission</button>
        </div>
    </div>

    <div id="result-screen" class="result-screen">
        <h1 style="color: #2c3e50;">Test Summary</h1>
        <div style="font-size: 4rem; color: #6c5ce7; font-weight: 800; margin: 20px 0;" id="final-score">0</div>
        <p style="font-size: 1.2rem; margin-bottom: 20px;">Total Marks Obtained</p>
        
        <div style="width: 100%; max-width: 300px; text-align: left; margin-bottom: 30px;">
            <p>✅ Correct Answers: <b id="res-c" style="color: #27ae60;">0</b></p>
            <p>❌ Wrong Answers: <b id="res-w" style="color: #e74c3c;">0</b></p>
            <p>⚪ Unattempted: <b id="res-u">0</b></p>
        </div>

        <h3 style="margin-bottom: 20px;">Best of Luck! 🏆</h3>
        
        <a href="https://youtube.com/@polaiacademy?si=gUwt0zAa-S8ccqhK" style="text-decoration: none; background: #ff0000; color: white; padding: 15px 30px; border-radius: 50px; font-weight: bold; width: 100%;">
            <i class="fab fa-youtube"></i> Subscribe Polai Academy
        </a>
    </div>

    <script>
        const questions = [
            { q: "Mr. Ram Kumar, the cashier are / on temporary withdrawal / from service.", options: ["On temporary withdrawal", "Mr. Ram Kumar, the cashier are", "From service", "No error"], correct: 1 },
            { q: "Without the greenhouse effect, / Earth temperature would be below freezing.", options: ["Earths temperature would", "Be below freezing", "Without the greenhouse effect", "No error"], correct: 0 },
            { q: "Peoples might confess / just to get out of / the interrogation room.", options: ["No error", "Peoples might confess", "Just to get out of", "The interrogation room"], correct: 1 },
            { q: "Many female mammals, including rabbits and cats ovulate / only when they mate.", options: ["No error", "Many female mammals", "Only when they mate", "Including rabbits and cats, ovulate"], correct: 3 },
            { q: "The baby's faces are expressionless and their pupils aren't visible...", options: ["No error", "The appearance of lifelessness", "Their pupils aren't visible", "The baby's faces are expressionless"], correct: 3 },
            { q: "Balloons filled with helium / travel hundreds or / even thousands of mile.", options: ["Balloons filled with helium", "Travel hundreds or", "No error", "Even thousands of mile"], correct: 3 },
            { q: "And so for the sakes / of his son he remained / absolutely calm.", options: ["Absolutely calm", "No error", "Of his son he remained", "And so for the sakes"], correct: 3 },
            { q: "Workers and companies in all sectors can contribute their skills to meet society new needs.", options: ["Sectors can contribute their skills", "No error", "To meet society new needs", "Workers and companies"], correct: 2 },
            { q: "Whatever a writer puts into a story probably comes with his own life experience.", options: ["With his own life experience", "No error", "Into a story probably comes", "Whatever a writer puts"], correct: 0 },
            { q: "Hundreds of migrants work in private firms in Erode.", options: ["Firms in Erode", "No error", "Hundreds of migrants", "Work in private"], correct: 1 },
            { q: "My friend Jatin usually wears a spectacle.", options: ["My friend Jatin", "Usually wears", "A spectacle", "No error"], correct: 2 },
            { q: "Uttar Pradesh accounts for about 16 per cent / of the country population.", options: ["Of the", "Country population", "Uttar Pradesh", "Accounts for about 16 per cent"], correct: 1 },
            { q: "Telecom is one of the Indias globally recognised success stories.", options: ["Recognised success stories", "Telecom is one of", "No error", "Indias globally"], correct: 3 }
        ];

        let currIdx = 0;
        let answers = new Array(questions.length).fill(null);
        let timeLeft = 25 * 60;

        function updateUI() {
            const q = questions[currIdx];
            document.getElementById('q-num').innerText = `Question ${currIdx + 1}/13`;
            document.getElementById('q-text').innerText = q.q;
            document.body.className = `bg-${currIdx % 5}`;

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = `option-btn ${answers[currIdx] === i ? 'selected' : ''}`;
                btn.innerText = `${String.fromCharCode(65 + i)}. ${opt}`;
                btn.onclick = () => selectOption(i);
                container.appendChild(btn);
            });

            // Palette
            const pal = document.getElementById('palette');
            pal.innerHTML = '';
            questions.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = `q-dot ${answers[i] !== null ? 'done' : ''} ${i === currIdx ? 'active' : ''}`;
                dot.innerText = i + 1;
                pal.appendChild(dot);
            });

            document.getElementById('prev-btn').style.visibility = currIdx === 0 ? 'hidden' : 'visible';
            document.getElementById('next-btn').style.display = currIdx === questions.length - 1 ? 'none' : 'block';
            document.getElementById('submit-btn').style.display = currIdx === questions.length - 1 ? 'block' : 'none';
        }

        function selectOption(i) {
            answers[currIdx] = i;
            calculateLiveScore();
            updateUI();
        }

        function calculateLiveScore() {
            let c = 0, w = 0;
            answers.forEach((ans, i) => {
                if (ans !== null) {
                    if (ans === questions[i].correct) c++;
                    else w++;
                }
            });
            document.getElementById('live-c').innerText = c;
            document.getElementById('live-w').innerText = w;
        }

        function changeQ(dir) {
            currIdx += dir;
            updateUI();
        }

        function showResult() {
            clearInterval(timerId);
            document.getElementById('result-screen').style.display = 'flex';
            let c = 0, w = 0, u = 0;
            answers.forEach((ans, i) => {
                if (ans === null) u++;
                else if (ans === questions[i].correct) c++;
                else w++;
            });
            document.getElementById('final-score').innerText = (c * 2) - (w * 1);
            document.getElementById('res-c').innerText = c;
            document.getElementById('res-w').innerText = w;
            document.getElementById('res-u').innerText = u;
        }

        // Timer
        const timerId = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            if (timeLeft <= 0) showResult();
        }, 1000);

        updateUI();
    </script>
</body>
</html>
